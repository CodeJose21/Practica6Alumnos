name: Java CI - Integration Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      checks: write
      pull-requests: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Dar permisos a Maven Wrapper
        run: chmod +x ./mvnw

      - name: Compilar proyecto
        run: ./mvnw compile --no-transfer-progress

      - name: Ejecutar tests de integración
        run: ./mvnw verify --no-transfer-progress

      - name: Mostrar informes generados
        if: always()
        run: |
          echo "Contenido de target:"
          ls -R target || true
          echo "Surefire reports:"
          ls -R target/surefire-reports || true
          echo "Failsafe reports:"
          ls -R target/failsafe-reports || true
          echo "JaCoCo:"
          ls -R target/site/jacoco || true

      - name: Publicar informe de tests
        uses: dorny/test-reporter@v1
        if: always()
        continue-on-error: true
        with:
          name: Resultados tests de integración
          path: |
            target/surefire-reports/*.xml
            target/failsafe-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Crear carpeta de badges
        if: always()
        run: mkdir -p .github/badges

      - name: Generar badge dinámico de compilación
        uses: emibcn/badge-action@v2
        if: always()
        with:
          label: build
          status: ${{ job.status }}
          color: ${{ job.status == 'success' && 'green' || 'red' }}
          path: .github/badges/build.svg

      - name: Generar badge de cobertura Jacoco
        uses: cicirello/jacoco-badge-generator@v2
        if: always()
        continue-on-error: true
        with:
          jacoco-csv-file: target/site/jacoco/jacoco.csv
          badges-directory: .github/badges
          generate-coverage-badge: true
          generate-branches-badge: true

      - name: Subir badges al repositorio
        uses: EndBug/add-and-commit@v9
        if: github.event_name == 'push'
        with:
          add: '.github/badges/*.svg'
          message: 'Actualizar badges de build y cobertura'